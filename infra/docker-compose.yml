services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: incidentsim
      POSTGRES_USER: incidentsim
      POSTGRES_PASSWORD: incidentsim
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U incidentsim -d incidentsim"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ../services/api
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
    ports:
      - "8080:80"
    volumes:
      - ../services/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../services/web:/usr/share/nginx/html:ro